name: Release Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-release:
    name: Create release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next tag
        id: next_tag
        shell: bash
        run: |
          set -euo pipefail

          existing_tag="$(git tag --points-at "$GITHUB_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [[ -n "$existing_tag" ]]; then
            echo "tag=$existing_tag" >> "$GITHUB_OUTPUT"
            echo "skip_create=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "skip_create=false" >> "$GITHUB_OUTPUT"

      - name: Configure git author
        if: steps.next_tag.outputs.skip_create == 'false'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create and push tag
        if: steps.next_tag.outputs.skip_create == 'false'
        env:
          NEXT_TAG: ${{ steps.next_tag.outputs.tag }}
        run: |
          git tag "$NEXT_TAG"
          git push origin "$NEXT_TAG"

      - name: Tag summary
        run: |
          echo "Tag: ${{ steps.next_tag.outputs.tag }}"
          echo "Skipped creation: ${{ steps.next_tag.outputs.skip_create }}"